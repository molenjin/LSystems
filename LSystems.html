<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="LSystems.js" defer></script>
    <script src="Examples.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="row mb-3">
            <div class="col">                
                <span><strong>L-Systems</strong> by <a href="mailto:molenjin@gmail.com">Miroslav Olenjin</a></span>
            </div>
            <div class="col text-end">
                <a href="https://github.com/molenjin/LSystems">Source code</a>
            </div>            
        </div>
        <div class="row">
            <div class="col-lg-2">
                <label for="examples">Examples:</label><select name="examples" class="form-select mb-1" id="examples" holder=""></select>
            </div>           
            <div class="col-lg-2">
                <label for="seed">Seed:</label><input id="seed" type="text" class="form-control mb-1" />
            </div>
            <div class="col-lg-2">
                <label for="rule">Rule:</label><input id="rule" type="text" class="form-control mb-1" />
            </div>
            <div class="col-lg-1">
                <label for="angle">Angle:</label><input id="angle" type="number" class="form-control mb-1" />
            </div>
            <div class="col-lg-1">
                <label for="startAngle">Start Angle:</label><input id="startAngle" type="number" class="form-control mb-1" />
            </div>            
            <div class="col-lg-1">
                <label for="length">Length:</label><input id="length" type="number" class="form-control mb-1" />
            </div>
            <div class="col-lg-1">
                <label for="generations">Generations:</label><input id="generations" type="text" class="form-control mb-1" />
            </div>
            <div class="col-lg-1">
                </br><button type="button" class="btn btn-primary w-100" id="runBtn" disabled>Run</button>
            </div>            
        </div>
        <div class="ratio ratio-1x1">
            <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>        
    </div>
</body>

<script type="module">
    const examples = document.getElementById("examples");
    examplesJson.examples.forEach(example => {
        examples.add(new Option(example.name, JSON.stringify(example)));
    });

    const runBtn = document.getElementById("runBtn");

    examples.addEventListener("change", (event) => {
        const selected = JSON.parse(event.target.value);
        document.getElementById("seed").value = selected.seed;
        document.getElementById("rule").value = selected.rule;
        document.getElementById("angle").value = parseInt(selected.angle);
        document.getElementById("startAngle").value = parseInt(selected.startAngle);
        document.getElementById("length").value = parseInt(selected.length);
        document.getElementById("generations").value = parseInt(selected.generations);

        runBtn.disabled = true;

        runSystem(selected.seed, selected.rule, selected.angle, selected.startAngle, selected.length, selected.generations);
    });

    examples.dispatchEvent(new Event('change'));

    document.querySelectorAll("input").forEach(input => input.addEventListener("input", () => {
        runBtn.disabled = false;
    }));

    document.getElementById("runBtn").addEventListener("click", () => {

        const allowedRegex = /^[F+\-\[\]]+$/;

        //-------------------------------------------------------------------

        const seed = document.getElementById("seed").value;
        if (seed === "") {
            alert("Seed cannot be empty.");
            return;
        }
        if (allowedRegex.test(seed) === false) {
            alert("Seed can only contain characters F, +, -, [, ].");
            return;
        }

        //-------------------------------------------------------------------

        const rule = document.getElementById("rule").value;
        if (rule === "") {
            alert("Rule cannot be empty.");
            return;
        }
        if (allowedRegex.test(rule) === false) {
            alert("Rule can only contain characters F, +, -, [, ].");
            return;
        }

        //-------------------------------------------------------------------

        const angle = parseFloat(document.getElementById("angle").value);
        if (isNaN(angle)) {
            alert("Angle must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const startAngle = parseFloat(document.getElementById("startAngle").value);
        if (isNaN(startAngle)) {
            alert("Start Angle must be a number.");
            return;
        }

        //-------------------------------------------------------------------        

        const length = parseFloat(document.getElementById("length").value);
        if (isNaN(length)) {
            alert("Length must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const generations = parseInt(document.getElementById("generations").value);
        if (isNaN(generations)) {
            alert("Generations must be a number.");
            return;
        }
        if (generations === 0) {
            alert("Generations must not be zero.");
            return;
        }
        if (generations < 0) {
            alert("Generations must be a non-negative number.");
            return;
        }
        if (generations > 12) {
            alert("Generations must be less than or equal to 12.");
            return;
        }

        //-------------------------------------------------------------------

        runSystem(seed, rule, angle, startAngle, length, generations);
    });
</script>

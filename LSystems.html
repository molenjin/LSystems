<head>
    <script src="LSystems.js" defer></script>
    <script src="Examples.js" defer></script>
</head>

<body>
    <svg id="canvas" width="auto" height="auto" style="position: fixed; z-index: -1;"
        xmlns="http://www.w3.org/2000/svg"></svg></br>
    <label>Examples: </br><select name="examples" id="examples" holder=""></select></label></br></br>
    <button type="button" id="generateBtn">Generate</button></br></br>
    <label>Seed: </br><input id="seed" type="text" /></label></br></br>
    <label>Rule: </br><input id="rule" type="text" /></label></br></br>
    <label>Turn: </br><input id="turn" type="number" /></label></br></br>
    <label>Start Angle: </br><input id="startAngle" type="number" /></label></br></br>
    <label>Start X: </br><input id="startX" type="number" /></label></br></br>
    <label>Start Y: </br><input id="startY" type="number" /></label></br></br>
    <label>Length: </br><input id="length" type="number" /></label></br></br>
    <label>Generations: </br><input id="generations" type="text" /></label></br></br>
</body>

<script type="module">
    const examples = document.getElementById("examples");
    examplesJson.examples.forEach(example => {
        examples.add(new Option(example.name, JSON.stringify(example)));
    });

    document.getElementById("examples").addEventListener("change", (event) => {
        const selectedExample = JSON.parse(event.target.value);
        document.getElementById("seed").value = selectedExample.seed;
        document.getElementById("rule").value = selectedExample.rule;
        document.getElementById("turn").value = selectedExample.turn;
        document.getElementById("startAngle").value = selectedExample.startAngle;
        document.getElementById("startX").value = selectedExample.startX;
        document.getElementById("startY").value = selectedExample.startY;
        document.getElementById("length").value = selectedExample.length;
        document.getElementById("generations").value = selectedExample.generations;
    });

    document.getElementById("generateBtn").addEventListener("click", () => {

        const allowedRegex = /^[F+\-\[\]]+$/;

        //-------------------------------------------------------------------

        const seed = document.getElementById("seed").value;
        if (seed === "") {
            alert("Seed cannot be empty.");
            return;
        }
        if (allowedRegex.test(seed) === false) {
            alert("Seed can only contain characters F, +, -, [, ].");
            return;
        }

        //-------------------------------------------------------------------

        const rule = document.getElementById("rule").value;
        if (rule === "") {
            alert("Rule cannot be empty.");
            return;
        }
        if (allowedRegex.test(rule) === false) {
            alert("Rule can only contain characters F, +, -, [, ].");
            return;
        }

        //-------------------------------------------------------------------

        const turn = parseFloat(document.getElementById("turn").value);
        if (isNaN(turn)) {
            alert("Turn must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const startAngle = parseFloat(document.getElementById("startAngle").value);
        if (isNaN(startAngle)) {
            alert("Start Angle must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const startX = parseFloat(document.getElementById("startX").value);
        if (isNaN(startX)) {
            alert("Start X must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const startY = parseFloat(document.getElementById("startY").value);
        if (isNaN(startY)) {
            alert("Start Y must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const length = parseFloat(document.getElementById("length").value);
        if (isNaN(length)) {
            alert("Length must be a number.");
            return;
        }

        //-------------------------------------------------------------------

        const generations = parseInt(document.getElementById("generations").value);
        if (isNaN(generations)) {
            alert("Generations must be a number.");
            return;
        }
        if (generations === 0) {
            alert("Generations must not be zero.");
            return;
        }
        if (generations < 0) {
            alert("Generations must be a non-negative number.");
            return;
        }
        if (generations > 12) {
            alert("Generations must be less than or equal to 12.");
            return;
        }

        //-------------------------------------------------------------------

        generateLSystem(seed, rule, turn, startAngle, startX, startY, length, generations);
    });
</script>
